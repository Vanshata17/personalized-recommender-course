name: 'ML Environment Setup'
description: 'Sets up Python environment with uv and project dependencies'

inputs:
  uv-version:
    description: 'Version of uv to install'
    required: false
    default: '0.4.30'

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: ${{ inputs.uv-version }}

    - name: Create virtual environment and install dependencies
      shell: bash
      run: |
        uv venv
        uv pip install pip
        uv pip install --all-extras -e .

    - name: Register Jupyter kernel
      shell: bash
      run: |
        uv run python -m ipykernel install --sys-prefix --name recsys-personalized --display-name "recsys-personalized"
        uv run python -m ipykernel install --sys-prefix --name python3 --display-name "Python 3"

    - name: Patch hsml for free-tier Hopsworks
      shell: bash
      run: |
        uv run python << 'EOF'
        import hsml.core.serving_api as sa
        import inspect
        src = inspect.getfile(sa)
        patch = "\nServingApi.get_resource_limits = lambda self: None\nServingApi.get_num_instances_limits = lambda self: None\nServingApi.get_knative_domain = lambda self: None\n"
        open(src, 'a').write(patch)
        print("Patched", src)
        EOF
